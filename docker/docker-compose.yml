version: "3.9"

services:
  pqc-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pqc_ai_server
    # Do not publish ports directly; nginx will proxy
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - ../benchmark/results:/app/benchmark/results
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  nginx:
    image: nginx:latest
    container_name: pqc_nginx
    ports:
      - "443:443" # HTTPS
      - "80:80" # HTTP redirect (optional)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - pqc-api
    restart: unless-stopped

  locust:
    image: locustio/locust
    container_name: pqc_locust
    ports:
      - "8089:8089"
    volumes:
      - ../benchmark:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host https://nginx # now points to nginx HTTPS
    depends_on:
      - nginx
